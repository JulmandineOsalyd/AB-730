    if(isFlagged) cls+=' dot-flagged';
    const flagMark=isFlagged?' 🚩':'';
    const ptsInfo=r&&(r.yn||r.match)?` · ${r.points}/${r.maxPoints} pts`:'';
    dotsHtml+=`<button class="${cls}" onclick="goTo(${i})" title="Question ${i+1}${ptsInfo}${flagMark}"></button>`;
  }
  dotsHtml+='</div>';

  let canSubmit;
  if(yn){canSubmit=yn.statements.every((_,i)=>sel[i]==='Yes'||sel[i]==='No');}
  else if(mq){canSubmit=mq.prompts.every((_,i)=>mq.choices.includes(sel[i]));}
  else{canSubmit=sel.length>0;}
  const btnSubmit=submitted?'':`<button class="btn btn-submit" onclick="submit()" ${canSubmit?'':'disabled'}>Valider</button>`;
  const btnNext=submitted?`<button class="btn btn-next" onclick="next()">${cur===total-1?'Terminer':'Suivant →'}</button>`:'';
  const shuffleCls=shuffle?'shuffle-btn shuffle-on':'shuffle-btn shuffle-off';
  const shuffleTxt=shuffle?'🔀 Aléatoire':'🔢 Ordre';

  app.innerHTML=`
    <div class="header">
      <span class="header-title">AB-731 · Microsoft AI</span>
      <span class="badge">${cur+1} / ${total}</span>
      <div class="header-right">
        <span class="score">✓ ${score} pts</span>
        <button class="${shuffleCls}" onclick="toggleShuffle()">${shuffleTxt}</button>
        <button class="history-btn" onclick="saveProgress()" title="Sauvegarder la progression">${saveStatus==='saving'?'⏳':saveStatus==='ok-progress'?'✓ Sauvé':saveStatus==='ko'?'⚠ Erreur':'💾 Sauver'}</button>
        <button class="history-btn" onclick="newSession()" title="Démarrer une nouvelle session">🆕 Nouveau</button>
        <button class="history-btn" onclick="openHistory()">📊 Historique</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="card-header">
        <div class="card-type">${q.multi?'⬜ Choix multiple — sélectionnez toutes les bonnes réponses':yn?`📋 Yes / No — chaque énoncé vaut 1 point (${yn.statements.length} pts max)`:mq?`🔗 Match — chaque association vaut 1 point (${mq.prompts.length} pts max)`:'⚪ Choix unique'}</div>
        <div class="card-header-row">
          <div class="card-q">${yn?yn.intro:mq?mq.intro:q.q}</div>
          <button class="flag-btn ${flagged.has(order[cur])?'flagged':''}" onclick="toggleFlag()" title="${flagged.has(order[cur])?'Retirer le drapeau':'Marquer cette question à refaire'}">${flagged.has(order[cur])?'🚩':'🏳️'}</button>
        </div>
      </div>
      ${optsHtml}
      ${expHtml}
      <div class="actions">
        <button class="btn btn-prev" onclick="prev()" ${cur===0?'disabled':''}>← Précédent</button>
        ${btnSubmit}${btnNext}
      </div>
    </div>
    ${dotsHtml}
  `;
}

function toggle(k){
  if(submitted)return;
  const q=questions[order[cur]];
  if(q.multi){sel=sel.includes(k)?sel.filter(x=>x!==k):[...sel,k];}
  else{sel=[k];}
  render();
}

function setYn(i,val){
  if(submitted)return;
  const q=questions[order[cur]];
  const yn=parseYesNoQuestion(q);
  if(!yn)return;
  if(!Array.isArray(sel)||sel.length!==yn.statements.length){
    sel=new Array(yn.statements.length).fill(null);
  }
  sel[i]=val;
  render();
}

function setMatch(i,val){
  if(submitted)return;
  const q=questions[order[cur]];
  const mq=parseMatchQuestion(q);
  if(!mq)return;
  if(!Array.isArray(sel)||sel.length!==mq.prompts.length){
    sel=new Array(mq.prompts.length).fill(null);
  }
  sel[i]=val;
  render();
}

function submit(){
  const q=questions[order[cur]];
  const yn=parseYesNoQuestion(q);
  const mq=!yn?parseMatchQuestion(q):null;
  if(yn){
    if(!Array.isArray(sel)||sel.length!==yn.statements.length||sel.some(v=>v!=='Yes'&&v!=='No'))return;
    const pts=sel.reduce((acc,v,i)=>acc+(v===yn.correct[i]?1:0),0);
    const correct=pts===yn.statements.length;
    submitted=true;
    score+=pts;
    results[cur]={correct,sel:[...sel],ans:yn.correct.slice(),yn:true,points:pts,maxPoints:yn.statements.length};
  } else if(mq){
    if(!Array.isArray(sel)||sel.length!==mq.prompts.length||sel.some(v=>!mq.choices.includes(v)))return;
    const pts=sel.reduce((acc,v,i)=>acc+(v===mq.correct[i]?1:0),0);
    const correct=pts===mq.prompts.length;
    submitted=true;
    score+=pts;
    results[cur]={correct,sel:[...sel],ans:mq.correct.slice(),match:true,points:pts,maxPoints:mq.prompts.length};
  } else {
    if(!sel.length)return;
    submitted=true;
    const correct=[...q.ans].sort().join()===[...sel].sort().join();
    if(correct)score++;
    results[cur]={correct,sel:[...sel],ans:q.ans};
  }
  render();
}

function next(){
  const total=questions.length;
  if(cur<total-1){cur++;sel=results[cur]?[...results[cur].sel]:[];submitted=!!results[cur];render();}
  else{done=true;saveSession();render();}
}

function buildPayload(status){
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  const duration=Math.round((Date.now()-startTime)/1000);
  return{
    session_id:sessionId,
    score,total,percentage:pct,duration_seconds:duration,shuffle,status,
    current_index:cur,
    updated_at:new Date().toISOString(),
    results:results.map((r,i)=>r?{i,correct:r.correct,sel:r.sel,ans:r.ans,q_index:order[i],yn:!!r.yn,match:!!r.match,points:r.points,maxPoints:r.maxPoints}:null).filter(Boolean),
    order_snapshot:order,
    flagged_questions:[...flagged]
  };
}

async function upsertSession(status){
  saveStatus='saving';render();
  let payload=buildPayload(status);
  try{
    let{error}=await sb.from('quiz_sessions').upsert(payload,{onConflict:'session_id'});
    if(error){
      const msg=(error.message||'').toLowerCase();
      if(msg.includes('flagged_questions')||msg.includes('column')){
        const{flagged_questions,...rest}=payload;
        const r=await sb.from('quiz_sessions').upsert(rest,{onConflict:'session_id'});
        if(r.error)throw r.error;
      }else throw error;
    }
    saveStatus=status==='completed'?'ok':'ok-progress';
  }catch(e){
    console.error('Save error',e);
    saveStatus='ko';
  }
  render();
  if(saveStatus==='ok-progress')setTimeout(()=>{if(saveStatus==='ok-progress'){saveStatus='';render();}},2500);
}

async function saveProgress(){
  if(done)return;
  await upsertSession('in_progress');
}

async function saveSession(){
  await upsertSession('completed');
}

async function tryResume(){
  const sid=localStorage.getItem(SESSION_KEY);
  if(!sid){sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);flagged=new Set();booting=false;render();return;}
  try{
    const{data,error}=await sb.from('quiz_sessions').select('*').eq('session_id',sid).maybeSingle();
    if(error)throw error;
    if(!data||data.status==='completed'){
      sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);flagged=new Set();booting=false;render();return;
    }
    sessionId=sid;
    shuffle=!!data.shuffle;
    if(data.order_snapshot&&Array.isArray(data.order_snapshot))order=data.order_snapshot;
    cur=data.current_index||0;
    score=data.score||0;
    results=[];
    if(Array.isArray(data.results)){
      data.results.forEach(r=>{if(typeof r.i==='number')results[r.i]={correct:r.correct,sel:r.sel,ans:r.ans,yn:!!r.yn,match:!!r.match,points:r.points,maxPoints:r.maxPoints};});
    }
    if(Array.isArray(data.flagged_questions))flagged=new Set(data.flagged_questions);
    else flagged=loadFlagsForSession(sid);
    persistFlags();
    sel=results[cur]?[...results[cur].sel]:[];
    submitted=!!results[cur];
  }catch(e){
    console.error('Resume error',e);
    sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);
    flagged=loadFlagsForSession(sessionId);
  }
  booting=false;
  render();
}

async function openHistory(){
  showHistory=true;
  historyLoading=true;
  historyData=null;
  render();
  try{
    const{data,error}=await sb.from('quiz_sessions').select('*').order('created_at',{ascending:false}).limit(50);
    if(error)throw error;
    historyData=data||[];
  }catch(e){
    console.error('Load error',e);
    historyData=[];
  }
  historyLoading=false;
  render();
}

function closeHistory(){
  showHistory=false;
  render();
}

function renderHistory(app){
  let body='';
  if(historyLoading){
    body='<div class="history-loading">⏳ Chargement...</div>';
  }else if(!historyData||historyData.length===0){
    body='<div class="history-empty">Aucune session enregistrée pour le moment.<br/>Termine un quiz pour voir ton historique ici.</div>';
  }else{
    body='<div class="history-list">'+historyData.map(s=>{
      const d=new Date(s.created_at);
      const dateStr=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      const pct=s.percentage;
      const cls=pct>=80?'good':pct>=60?'mid':'bad';
      const dur=s.duration_seconds?Math.round(s.duration_seconds/60)+' min':'—';
      const mode=s.shuffle?'🔀 Aléatoire':'🔢 Ordre';
      const inProgress=s.status==='in_progress';
      const statusBadge=inProgress?'<span style="background:#fef3c7;color:#b45309;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-left:6px">EN COURS</span>':'';
      const resumeBtn=inProgress&&s.session_id?`<button class="history-btn" style="margin-left:8px;background:#2563eb;color:#fff" onclick="resumeSessionFromHistory('${s.session_id}')">▶ Reprendre</button>`:'';
      const flags=Array.isArray(s.flagged_questions)?s.flagged_questions:[];
      const flagCount=flags.length;
      const reviewBtn=flagCount?`<button class="history-btn" style="margin-left:8px;background:#f59e0b;color:#fff" onclick='startReviewFlagged(${JSON.stringify(flags)})' title="Revoir les questions flaguées de cette session">🚩 Revoir (${flagCount})</button>`:'';
      const flagMeta=flagCount?` · 🚩 ${flagCount}`:'';
      return `<div class="history-item">
        <div style="flex:1;min-width:0">
          <div class="history-date">${dateStr}${statusBadge}</div>
          <div class="history-meta">${s.score}/${s.total} · question ${(s.current_index||0)+1} · ${dur} · ${mode}${flagMeta}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          <div class="history-score ${cls}">${pct}%</div>
          ${resumeBtn}
          ${reviewBtn}
        </div>
      </div>`;
    }).join('')+'</div>';
  }
  app.innerHTML=`<div class="history">
    <div class="history-title">
      <span>📊 Historique des sessions</span>
      <span style="font-size:12px;font-weight:500;color:#94a3b8">${historyData?historyData.length:0} session(s)</span>
    </div>
    ${body}
    <button class="btn-back" onclick="closeHistory()">← Retour</button>
  </div>`;
}

function prev(){
  if(cur>0){cur--;sel=results[cur]?[...results[cur].sel]:[];submitted=!!results[cur];render();}
}

function goTo(i){
  const total=questions.length;
  if(i<0||i>=total||i===cur)return;
  cur=i;
  sel=results[cur]?[...results[cur].sel]:[];
  submitted=!!results[cur];
  render();
}

function toggleShuffle(){
  shuffle=!shuffle;
  order=shuffle?shuffleArr(questions.map((_,i)=>i)):questions.map((_,i)=>i);
  cur=0;sel=[];submitted=false;score=0;done=false;results=[];saveStatus='';startTime=Date.now();
  sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);
  flagged=new Set();persistFlags();
  render();
}

function restart(){
  order=shuffle?shuffleArr(questions.map((_,i)=>i)):questions.map((_,i)=>i);
  cur=0;sel=[];submitted=false;score=0;done=false;results=[];saveStatus='';startTime=Date.now();
  sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);
  flagged=new Set();persistFlags();
  render();
}

function startReviewFlagged(srcFlagged){
  const list=Array.isArray(srcFlagged)?srcFlagged.slice():[...flagged];
  if(!list.length){alert('Aucune question flaguée à revoir.');return;}
  order=list.filter(i=>typeof i==='number'&&i>=0&&i<questions.length);
  if(!order.length){alert('Aucune question flaguée valide à revoir.');return;}
  cur=0;sel=[];submitted=false;score=0;done=false;results=[];saveStatus='';startTime=Date.now();
  sessionId=newSessionId();localStorage.setItem(SESSION_KEY,sessionId);
  flagged=new Set(order);persistFlags();
  showHistory=false;
  render();
}

function newSession(){
  if(!confirm('Démarrer une nouvelle session ? La progression non sauvegardée sera perdue.'))return;
  restart();
}

async function resumeSessionFromHistory(sid){
  showHistory=false;
  booting=true;
  render();
  try{
    const{data,error}=await sb.from('quiz_sessions').select('*').eq('session_id',sid).maybeSingle();
    if(error)throw error;
    if(!data){alert('Session introuvable');booting=false;render();return;}
    sessionId=sid;
    localStorage.setItem(SESSION_KEY,sessionId);
    shuffle=!!data.shuffle;
    if(data.order_snapshot&&Array.isArray(data.order_snapshot))order=data.order_snapshot;
    else order=questions.map((_,i)=>i);
    cur=data.current_index||0;
    score=data.score||0;
    results=[];
    if(Array.isArray(data.results)){
      data.results.forEach(r=>{if(typeof r.i==='number')results[r.i]={correct:r.correct,sel:r.sel,ans:r.ans,yn:!!r.yn,match:!!r.match,points:r.points,maxPoints:r.maxPoints};});
    }
    if(Array.isArray(data.flagged_questions))flagged=new Set(data.flagged_questions);
    else flagged=loadFlagsForSession(sid);
    persistFlags();
    sel=results[cur]?[...results[cur].sel]:[];
    submitted=!!results[cur];
    done=data.status==='completed';
    saveStatus='';
    startTime=Date.now();
  }catch(e){
    console.error('Resume error',e);
    alert('Erreur de chargement de la session');
  }
  booting=false;
  render();
}

tryResume();
</script>
</body>
</html>
