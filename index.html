<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#f0f4ff,#e8f0fe);min-height:100vh;padding:16px;font-size:16px}

  .opt:hover{border-color:#93c5fd;background:#eff6ff}

  /* DONE SCREEN */
  .done{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:32px 24px;text-align:center;max-width:480px;margin:40px auto}
  .done-emoji{font-size:56px;margin-bottom:12px}

  .btn-restart{width:100%;background:#2563eb;color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer}
  .history-btn{font-size:13px;padding:5px 12px;border-radius:999px;font-weight:700;border:none;cursor:pointer;background:#e2e8f0;color:#475569;transition:all .2s}

  .save-status{font-size:13px;color:#64748b;text-align:center;margin-top:8px;min-height:16px}

  .history{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:24px;margin-top:16px}
  .history-title{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}

  .btn-back{width:100%;background:#2563eb;color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
  .history-loading{text-align:center;padding:24px;color:#94a3b8;font-size:15px}
  .flag-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:transform .15s, background .15s;line-height:1}
  .flag-btn:hover{background:rgba(255,255,255,.15);transform:scale(1.15)}
  .flag-btn.flagged{filter:drop-shadow(0 0 4px #fbbf24)}
  .card-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .card-header-row .card-q{flex:1}
  .dot-flagged{box-shadow:0 0 0 2px #f59e0b inset, 0 0 0 3px #fff inset}
  .review-banner{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:14px;color:#b45309;font-weight:600}
  .review-banner button{background:#b45309;color:#fff;border:none;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .btn-review{width:100%;background:#f59e0b;color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
  .btn-review:disabled{opacity:.4;cursor:default}
  /* YES/NO TABLE */
  .yn-wrap{padding:8px 18px 0}
  .yn-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;border:1.5px solid #e2e8f0}
  .yn-table thead th{background:#f8fafc;font-size:13px;font-weight:700;color:#475569;padding:12px 10px;text-align:left;border-bottom:1.5px solid #e2e8f0}
  .yn-table thead th.yn-col{text-align:center;width:72px}
  .yn-table tbody td{padding:14px 10px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#1e293b;line-height:1.5;vertical-align:middle}
  .yn-table tbody tr:last-child td{border-bottom:none}
  .yn-table tbody td.yn-cell{text-align:center;width:72px}
  .yn-stmt-num{display:inline-block;background:#eff6ff;color:#2563eb;font-weight:700;font-size:12px;border-radius:6px;padding:2px 7px;margin-right:8px}
  .yn-radio{appearance:none;-webkit-appearance:none;width:22px;height:22px;border:2px solid #cbd5e1;border-radius:50%;cursor:pointer;position:relative;background:#fff;transition:all .15s}
  .yn-radio:hover:not(:disabled){border-color:#93c5fd}
  .yn-radio:checked{border-color:#2563eb;background:#2563eb}
  .yn-radio:checked::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
  .yn-radio:disabled{cursor:default}
  .yn-cell.yn-correct .yn-radio{border-color:#16a34a;background:#16a34a}
  .yn-cell.yn-correct .yn-radio::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
  .yn-cell.yn-wrong .yn-radio{border-color:#dc2626;background:#dc2626}
  .yn-cell.yn-wrong .yn-radio::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
  .yn-cell.yn-missed .yn-radio{border:2px dashed #16a34a;background:#f0fdf4}
  .yn-row-ok{background:#f0fdf4}
  .yn-row-ko{background:#fef2f2}
  .yn-feedback{font-size:11px;font-weight:700;margin-top:4px;display:block}
  .yn-feedback.ok{color:#15803d}
  .yn-feedback.ko{color:#b91c1c}
  /* MATCH TABLE */
  .m-wrap{padding:8px 18px 0}
  .m-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
  .m-prompt{flex:1 1 240px;min-width:200px;font-size:14px;color:#1e293b;line-height:1.5}
  .m-label{display:inline-block;background:#eff6ff;color:#2563eb;font-weight:700;font-size:12px;border-radius:6px;padding:2px 7px;margin-right:8px}

  .m-choice{border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:#1e293b;text-align:left;transition:all .15s}
  .m-choice:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff}

  .m-choice:disabled{cursor:default}
  .m-choice.correct{border-color:#16a34a;background:#f0fdf4;color:#14532d}
  .m-choice.wrong{border-color:#dc2626;background:#fef2f2;color:#7f1d1d}
  .m-choice.missed{border:1.5px dashed #16a34a;background:#f0fdf4;color:#14532d}
  .m-row.ok{background:#f0fdf4}
  .m-row.ko{background:#fef2f2}
  .m-feedback{font-size:11px;font-weight:700;margin-top:6px;display:block}

  .m-feedback.ko{color:#b91c1c}
</style>

<body>
<div class="container" id="app"></div>
<script>
const questions=[
{q:"Votre entreprise prévoit de développer une solution d'IA générative basée sur des données internes. Vous recommandez Microsoft Foundry. Quel est un avantage clé de l'utilisation de Microsoft Foundry pour ce projet ?",opts:["A. Fournit une plateforme évolutive pour développer et déployer des solutions d'IA générative.","B. Supprime la nécessité de sélectionner ou de configurer le modèle d'IA sous-jacent.","C. Permet aux utilisateurs métier de créer des solutions d'IA générative.","D. Offre une plateforme low-code pour développer des solutions d'IA générative."],ans:["C"],multi:false,exp:"Microsoft Foundry est une plateforme d'entreprise conçue pour aider les équipes à créer, déployer et gérer des solutions d'IA générative ancrées dans leurs propres données internes. Il inclut des interfaces low-code/no-code et des playgrounds visuels permettant aux contributeurs non techniques d'expérimenter."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft Foundry aide les organisations à créer et gérer en toute sécurité des solutions d'IA générative dans un environnement gouverné.\n2. Microsoft Foundry offre une évolutivité intégrée pour permettre aux organisations d'étendre les charges de travail d'IA.\n3. Microsoft Foundry peut être utilisé pour la reconnaissance d'images et les tâches de vision par ordinateur.",opts:["A. Yes / Yes / Yes","B. Yes / No / Yes","C. No / Yes / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] Microsoft Foundry est une plateforme unifiée et interopérable pour créer et gérer des solutions d'IA dans un environnement sécurisé et gouverné. [2] Il fournit une évolutivité automatisée intégrée. [3] Il offre Azure Vision pour la reconnaissance d'images, OCR, détection d'objets, etc."},
{q:"Vous utilisez ______ pour entraîner un modèle qui prévoira la demande de produits sur la base des données historiques de ventes.",opts:["A. Azure Machine Learning","B. Azure AI Search","C. Azure OpenAI","D. Microsoft Foundry"],ans:["A"],multi:false,exp:"Azure Machine Learning, et plus précisément Automated Machine Learning (AutoML) pour la prévision de séries temporelles, est le mieux adapté pour entraîner un modèle de prévision de la demande à partir de données de ventes historiques."},
{q:"Quelle exigence métier est la plus étroitement liée au grounding d'un modèle d'IA générative ?",opts:["A. la prise en charge de plusieurs langues","B. la mesure du nombre d'interactions utilisateur par jour","C. permettre aux utilisateurs d'interagir en utilisant des requêtes en langage naturel","D. s'assurer que des sources de données d'entreprise vérifiées sont utilisées pour la génération de réponses"],ans:["D"],multi:false,exp:"S'assurer que des sources de données d'entreprise vérifiées sont utilisées pour la génération de réponses correspond au grounding (ancrage) d'un modèle d'IA générative, en ancrant ses sorties dans des informations fiables, spécifiques au domaine ou à l'entreprise."},
{q:"Vous devez créer un modèle Azure Machine Learning personnalisé. Les données utilisées pour entraîner le modèle sont cohérentes et uniformes. Que devez-vous faire en premier ?",opts:["A. Préparer les données d'entraînement.","B. Évaluer le modèle.","C. Entraîner le modèle.","D. Régler les hyperparamètres.","E. Déployer le modèle."],ans:["A"],multi:false,exp:"La première étape consiste à acquérir et préparer les données : collecte, nettoyage, prétraitement, transformation, ingénierie des caractéristiques et fractionnement des données en ensembles d'entraînement/validation/test."},
{q:"Votre entreprise utilise un modèle d'IA générative non-raisonnant pour créer du contenu textuel. Vous découvrez que les réponses du modèle sont incohérentes. Comment améliorer les prompts ?",opts:["A. Fournir aux prompts des exemples extensifs de la sortie attendue.","B. Ajouter le contexte, les sources et les attentes aux prompts.","C. Utiliser des termes techniques dans les prompts pour améliorer la compréhension de l'IA.","D. Ajouter une seule exigence concise aux prompts."],ans:["B"],multi:false,exp:"Pour rendre cohérentes les sorties d'un modèle non-raisonnant, fournissez un cadre structuré avec des contraintes contextuelles (audience, domaine), des sources/grounding, et des attentes explicites (format, ton)."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Un modèle d'IA générative garantit des réponses factuellement exactes s'il est entraîné sur un grand jeu de données.\n2. Le filtrage de contenu et les protections d'IA responsable aident un modèle d'IA générative à générer du contenu sûr et inoffensif.\n3. Un modèle d'IA générative produit toujours des résultats justes et impartiaux lorsque les données d'entraînement ont été correctement préparées et examinées pour l'équité.",opts:["A. No / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] No : un grand jeu de données ne garantit pas l'exactitude factuelle (hallucinations). [2] Yes : les filtres de contenu détectent et bloquent le contenu nuisible. [3] No : des biais peuvent émerger de la conception algorithmique, RLHF, ou nature stochastique."},
{q:"Une solution d'IA ______ reconnaît des motifs dans de grands jeux de données complexes pour créer du contenu nouveau et original.",opts:["A. prescriptive","B. prédictive","C. générative"],ans:["C"],multi:false,exp:"L'IA générative analyse de grands jeux de données pour identifier des motifs statistiques et créer du contenu entièrement nouveau, original et de haute qualité qui imite l'expression humaine."},
{q:"Votre entreprise prévoit d'utiliser l'IA générative pour aider les chefs de projet et les ingénieurs avec des plans de construction au format PDF. Vous avez besoin d'une solution qui traite les images et le texte, résume les conceptions, répond aux questions et extrait des informations. Que recommandez-vous ?",opts:["A. une solution multi-modale","B. une solution de reconnaissance optique de caractères (OCR)","C. une solution de complétion de texte","D. une solution de résumé de documents"],ans:["D"],multi:false,exp:"Une solution multimodale d'IA générative pour le résumé de documents (MLLM) intègre vision par ordinateur et analyse de texte pour traiter des PDFs, des plans CAD, en interprétant les relations spatiales et les indices visuels."},
{q:"Dans quel scénario Azure Machine Learning est-il le plus susceptible d'offrir une valeur stratégique pour une organisation ?",opts:["A. Utiliser les données historiques de ventes pour prévoir la demande à travers les catégories de produits.","B. Numériser un processus papier pour réduire les erreurs.","C. Saisir les commentaires des clients dans un tableur pour comprendre le sentiment.","D. Envoyer des emails personnalisés aux clients en fonction de l'emplacement du client."],ans:["A"],multi:false,exp:"Azure ML offre une valeur stratégique en transformant les données historiques de ventes en avantage concurrentiel via la prévision de la demande, l'optimisation des stocks, des performances financières et l'agilité opérationnelle."},
{q:"L'objectif principal de l'IA générative est ______.",opts:["A. d'analyser les tendances et de classer les sources de données.","B. de créer du nouveau contenu, tel que du texte, des images ou du code.","C. de faire des prédictions basées sur des données historiques."],ans:["B"],multi:false,exp:"L'IA générative (GenAI) est conçue pour créer du contenu nouveau et original — texte, images, vidéos, audio, code — en apprenant des motifs à partir de jeux de données existants."},
{q:"L'utilisation de données de grounding de haute qualité dans une solution d'IA générative ______.",opts:["A. garantit que toutes les réponses sont factuellement exactes.","B. augmente les performances d'un modèle d'IA.","C. améliore l'exactitude et la fiabilité des prédictions et des sorties de l'IA.","D. augmente la quantité de stockage requise pour héberger un modèle d'IA."],ans:["C"],multi:false,exp:"Le grounding de haute qualité agit comme une 'vérification de la réalité' en connectant les LLM à des sources externes fiables, ce qui réduit les hallucinations et garantit des réponses basées sur des faits vérifiables."},
{q:"L'ingénierie de prompts est le processus de ______.",opts:["A. intégrer des outils alimentés par l'IA dans les flux de travail métier.","B. identifier et corriger les erreurs dans le contenu généré par l'IA.","C. concevoir, développer et entraîner des modèles d'IA générative.","D. élaborer des instructions claires pour guider les solutions d'IA générative dans la génération de contenu approprié au contexte."],ans:["D"],multi:false,exp:"L'ingénierie de prompts consiste à concevoir, évaluer et améliorer les prompts pour obtenir des sorties plus précises d'un modèle d'IA, en réduisant l'ambiguïté."},
{q:"Lorsqu'un modèle d'IA générative produit une sortie qui semble réaliste mais contient des informations incorrectes, ce comportement est connu sous le nom de ______.",opts:["A. fuite de données.","B. inexactitude du modèle.","C. surdépendance.","D. injection de prompt."],ans:["B"],multi:false,exp:"Ce comportement spécifique — où l'IA génère des informations plausibles mais factuellement incorrectes — est appelé hallucination ou inexactitude du modèle. La surdépendance fait référence au comportement humain d'accepter ces sorties incorrectes."},
{q:"Votre entreprise utilise une solution d'IA générative. Vous devez améliorer la qualité des réponses en utilisant le grounding. Quelle déclaration décrit correctement comment le grounding améliore l'exactitude et la pertinence ?",opts:["A. fait référence à un ensemble divers de personnes, de disciplines et de perspectives","B. explique comment et pourquoi les modèles d'IA génèrent du contenu","C. ancre les réponses dans des sources de données spécifiques","D. spécifie les forces et les faiblesses du modèle d'IA"],ans:["C"],multi:false,exp:"Le grounding lie ou 'ancre' les sorties du LLM à des sources de données vérifiées et à jour, réduisant les hallucinations, améliorant la pertinence contextuelle et garantissant la fraîcheur des données."},
{q:"Vous devez fournir aux parties prenantes une description pertinente de l'IA générative. Quelle description utiliser ?",opts:["A. L'IA générative est conçue pour générer des réponses basées sur les prompts en langage naturel d'un utilisateur.","B. L'IA générative est conçue pour traduire des documents dans d'autres langues.","C. L'IA générative est conçue pour prédire les tendances futures sur la base de données historiques.","D. L'IA générative est conçue pour recommander des produits sur la base du comportement des utilisateurs."],ans:["A"],multi:false,exp:"L'IA générative est une forme d'IA conçue pour créer du contenu nouveau et original en réponse aux prompts en langage naturel fournis par l'utilisateur."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Une solution d'IA générative est bien adaptée pour prédire les tendances de ventes du prochain trimestre.\n2. Une solution d'IA générative peut résumer de longs documents de politique.\n3. Une solution d'IA générative peut créer des descriptions de produits à partir de spécifications de produits.",opts:["A. No / Yes / Yes","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"[1] No : l'IA prédictive, et non générative, est conçue pour la prévision. [2] Yes : la GenAI excelle dans le résumé de documents longs. [3] Yes : la GenAI rationalise l'e-commerce en transformant les spécifications en descriptions engageantes."},
{q:"Quelle déclaration décrit correctement la différence entre un modèle d'IA générative pré-entraîné et un modèle ajusté ?",opts:["A. Un modèle pré-entraîné nécessite des données étiquetées, contrairement à un modèle ajusté.","B. Un modèle pré-entraîné est plus rapide à entraîner qu'un modèle ajusté car il utilise moins de paramètres.","C. Un modèle pré-entraîné est entraîné sur des jeux de données larges, tandis qu'un modèle ajusté est adapté pour bien fonctionner sur un jeu de données plus étroit et spécifique à un domaine.","D. Un modèle pré-entraîné est optimisé pour une tâche spécifique, tandis qu'un modèle ajusté est conçu pour un usage général."],ans:["C"],multi:false,exp:"Les modèles pré-entraînés acquièrent des connaissances fondamentales sur de vastes ensembles de données, tandis que les modèles ajustés affinent ces poids sur des jeux de données plus petits et spécifiques pour améliorer la précision dans des tâches ou industries étroites."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Retrieval Augmented Generation (RAG) nécessite un ajustement (fine-tuning) du modèle.\n2. RAG est utile lorsque vous avez besoin d'une solution d'IA générative pouvant accéder à des informations actuelles et vérifiables.\n3. RAG vous permet d'obtenir des réponses plus pertinentes basées sur les documents de votre organisation sans réentraîner le modèle de base.",opts:["A. No / Yes / Yes","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] No : RAG ne nécessite pas de fine-tuning, il améliore les LLM avec des données externes. [2] Yes : RAG donne accès à des informations actuelles et vérifiables. [3] Yes : RAG permet d'utiliser les documents de l'organisation sans réentraînement."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Le manque de confiance dans la sécurité et l'exactitude des solutions d'IA est un obstacle courant à l'adoption de l'IA.\n2. Les efforts d'adoption de l'IA échouent souvent lorsque les organisations négligent l'importance de données de haute qualité.\n3. L'adoption de l'IA réussit le mieux lorsqu'elle est mise en œuvre avec les parties prenantes métier et de conformité.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. Le manque de confiance (boîte noire, hallucinations, sécurité), les données de mauvaise qualité (jusqu'à 85% des projets IA échouent), et la collaboration interfonctionnelle sont tous critiques pour le succès de l'IA."},
{q:"Votre entreprise crée un modèle Azure Machine Learning personnalisé qui utilise un assistant d'IA générative. Le modèle offre initialement de bons résultats. Cependant, six mois plus tard, les prédictions du modèle deviennent nettement moins précises. Quelle est la cause possible du problème ?",opts:["A. Le modèle nécessite des ressources de calcul supplémentaires.","B. Les données d'entrée ont changé au fil du temps.","C. Le modèle a été entraîné de manière incorrecte."],ans:["B"],multi:false,exp:"Ce phénomène est connu sous le nom de dérive des données (data drift). Les propriétés statistiques des données d'entrée changent par rapport à celles sur lesquelles le modèle a été entraîné, entraînant une diminution de l'exactitude."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. L'IA générative peut être utilisée dans l'automatisation de flux de travail complexes.\n2. L'IA générative peut être utilisée pour générer du nouveau contenu, comme du texte, des images et de la musique.\n3. L'IA générative est la mieux adaptée pour effectuer des calculs mathématiques et résoudre des équations.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : la GenAI peut automatiser des flux de travail complexes via la prise de décision contextuelle. [2] Yes : la GenAI crée du contenu nouveau et original. [3] No : la GenAI n'est pas idéale pour les calculs précis (les CAS comme Wolfram Alpha sont meilleurs)."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Les architectures RAG exigent qu'un grand modèle de langage (LLM) soit réentraîné sur des données propriétaires.\n2. RAG ancre un modèle de langage pour produire des réponses plus factuelles et pertinentes au contexte.\n3. RAG récupère des informations à partir de sources de connaissances externes au moment de l'exécution au lieu de s'appuyer uniquement sur les connaissances d'un modèle d'IA générative.",opts:["A. No / Yes / Yes","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"[1] No : RAG n'exige pas le réentraînement du LLM. [2] Yes : RAG ancre le modèle pour des réponses plus factuelles. [3] Yes : RAG récupère les informations au runtime depuis des sources externes."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Un générateur de texte vers image peut être utilisé pour traduire du contenu dans d'autres langues.\n2. Un modèle d'analyse prédictive peut générer un nouveau contenu marketing pour les publicités en ligne d'une entreprise.\n3. Un chatbot d'IA générative peut engager les clients dans des conversations personnalisées et recommander des produits.",opts:["A. Yes / No / Yes","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"[1] Yes : les outils d'IA peuvent extraire et traduire le texte dans les images. [2] No : l'analyse prédictive guide le contenu mais ne le crée pas ; c'est le rôle de l'IA générative. [3] Yes : les chatbots GenAI personnalisent les conversations."},
{q:"Vous avez un grand modèle de langage (LLM) pré-entraîné sur des données publiques. Vous voulez que le LLM génère des réponses qui incorporent du contenu propriétaire fréquemment mis à jour, comme des documents internes. Que devez-vous recommander ?",opts:["A. Retrieval Augmented Generation (RAG)","B. ingénierie de prompts","C. filtrage de contenu","D. ajustement (fine-tuning) du modèle"],ans:["A"],multi:false,exp:"RAG est l'approche standard de l'industrie pour incorporer des données propriétaires fréquemment mises à jour dans la sortie d'un LLM en le connectant à une base de connaissances externe et dynamique."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. L'ingénierie de prompts modifie la manière dont un modèle d'IA générative a été entraîné.\n2. L'ingénierie de prompts se concentre sur la conception d'instructions claires, concises et riches en contexte.\n3. Une ingénierie de prompts efficace consiste à maximiser le nombre de tokens utilisés dans chaque requête.",opts:["A. No / Yes / No","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] No : l'ingénierie de prompts change la manière dont un modèle pré-entraîné est utilisé pendant l'inférence, pas son entraînement. [2] Yes : elle se concentre sur des instructions claires, concises et riches en contexte. [3] No : elle se concentre sur l'optimisation des tokens, non leur maximisation."},
{q:"Une ingénierie de prompts efficace augmente ______.",opts:["A. la capacité de stockage requise pour les données d'IA.","B. le temps d'entraînement requis pour les modèles d'IA générative.","C. l'exactitude et la pertinence des réponses générées par l'IA."],ans:["C"],multi:false,exp:"L'ingénierie de prompts efficace est le processus stratégique de conception, raffinement et optimisation des entrées des LLM pour produire des sorties précises, pertinentes et de haute qualité."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. L'ingénierie de prompts consiste à spécifier des directives qui aident un modèle d'IA générative à générer des réponses utiles et précises.\n2. L'instruction est la partie du prompt qui inclut des exemples pour montrer à l'IA à quoi sa réponse devrait ressembler.\n3. Le contexte est la partie du prompt qui aide un modèle d'IA générative à comprendre quelles informations utiliser pour générer une réponse.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] L'ingénierie de prompts spécifie des directives pour des réponses utiles. [2] L'instruction inclut des exemples (few-shot prompting). [3] Le contexte fournit la 'cadre de référence' pour orienter la réponse."},
{q:"Votre entreprise prévoit d'utiliser l'IA générative pour aider à construire un site web. Quelle capacité décrit le mieux un avantage de l'utilisation de l'IA générative ?",opts:["A. créer des descriptions de produits basées sur les spécifications de produits","B. concevoir un nouveau produit basé sur les exigences des clients","C. traduire les descriptions de produits dans une autre langue","D. analyser les ventes de produits pour identifier des motifs et des tendances"],ans:["C"],multi:false,exp:"L'IA générative peut rationaliser la création et la localisation d'un site vitrine de produits avec une traduction contextuelle, l'adaptation du ton/style, l'évolutivité et l'optimisation SEO."},
{q:"La principale différence entre l'IA générative et l'IA prédictive est que l'IA générative ______.",opts:["A. utilise un jeu de données plus petit.","B. produit des résultats plus précis.","C. peut produire du contenu nouveau et original."],ans:["C"],multi:false,exp:"L'IA générative crée du contenu nouveau et original — texte, images, code, audio — en apprenant des motifs à partir des données. L'IA prédictive analyse les données historiques pour prévoir les résultats futurs."},
{q:"Votre entreprise vend du matériel de randonnée et de camping en ligne. Vous avez besoin d'une solution d'IA générative qui peut interagir avec les clients, poser des questions sur leurs besoins, et escalader à un agent humain si nécessaire. Que devez-vous utiliser ?",opts:["A. un chatbot","B. l'IA prédictive","C. un moteur de recommandation","D. la vision par ordinateur"],ans:["A"],multi:false,exp:"Les chatbots d'IA générative fonctionnent comme un point de contact principal dans le service client moderne, utilisant NLP et LLM pour engager dans un dialogue humain plutôt que des scripts pré-programmés rigides."},
{q:"Votre entreprise reçoit des milliers de factures numérisées chaque mois. Vous devez recommander une solution d'IA qui peut automatiquement extraire les détails clés. Quelle est la meilleure solution ?",opts:["A. Azure Document Intelligence dans Foundry Tools","B. Azure Vision dans Foundry Tools","C. Azure AI Search","D. Azure Machine Learning"],ans:["A"],multi:false,exp:"Azure Document Intelligence dans Foundry Tools est la solution privilégiée pour extraire automatiquement des données structurées — noms de fournisseurs, ID de factures, montants totaux — à partir de factures, PDFs et images."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Pour utiliser Microsoft 365 Copilot Chat, vous devez avoir une licence Microsoft 365 Copilot.\n2. Microsoft 365 Copilot Chat fournit une assistance contextuelle dans les applications Microsoft 365.\n3. Microsoft 365 Copilot Chat ne peut accéder qu'aux informations dans les fichiers ouverts et lire les emails.",opts:["A. No / Yes / No","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] No : Microsoft inclut une version de base de Copilot Chat sans coût supplémentaire. [2] Yes : Copilot Chat fournit une assistance contextuelle dans les applications M365. [3] No : Copilot peut accéder à un éventail beaucoup plus large de données organisationnelles via Microsoft Graph."},
{q:"L'agent Analyst dans Microsoft 365 Copilot ______.",opts:["A. compile des recherches de fond pour un nouveau marché ou une nouvelle initiative.","B. vous permet de générer des résumés audio de références sélectionnées.","C. utilise un agent conversationnel pour répondre aux FAQ des employés.","D. utilise des données structurées et fournit des insights en utilisant du texte, des graphiques, des tableaux et d'autres visuels."],ans:["D"],multi:false,exp:"L'agent Analyst dans Microsoft 365 Copilot est un 'data scientist virtuel' spécialisé conçu pour transformer des données structurées brutes en insights actionnables en utilisant du texte, tableaux, graphiques."},
{q:"Votre entreprise découvre que plusieurs employés utilisent des comptes ChatGPT personnels pour aider aux tâches professionnelles. Vous êtes préoccupé par le partage externe de données propriétaires. Quelle capacité est un avantage clé de Copilot par rapport à un compte ChatGPT personnel ?",opts:["A. analyser et produire des rapports basés sur des données complexes","B. générer des idées et résoudre des problèmes","C. rédiger des documents, des emails, des présentations et du matériel marketing","D. accéder aux données internes conformément aux politiques Microsoft 365 existantes"],ans:["D"],multi:false,exp:"L'avantage majeur de Microsoft 365 Copilot est son intégration profonde avec les données internes de l'organisation tout en respectant strictement les politiques de sécurité, de conformité et de confidentialité existantes."},
{q:"L'agent Researcher dans Microsoft 365 Copilot ______.",opts:["A. crée des tableaux de bord visuels à partir de données structurées dans Microsoft Excel et Power BI.","B. génère un tableau croisé dynamique et effectue des prévisions de séries temporelles.","C. effectue des tâches d'analyse de données multi-étapes complexes et d'exécution de code sur des jeux de données arbitraires.","D. utilise des capacités de raisonnement pour générer des insights profonds basés sur les données organisationnelles et le web."],ans:["D"],multi:false,exp:"L'agent Researcher est spécialement conçu comme un spécialiste du 'raisonnement profond' pour des tâches de recherche complexes multi-étapes, utilisant un grounding double-source (web + données organisationnelles via Microsoft Graph)."},
{q:"Que devez-vous utiliser pour chaque tâche ?\nP1: Extraire des données structurées de formulaires et de factures.\nP2: Résumer le contenu écrit des rapports d'entreprise.\nP3: Générer du texte descriptif pour des images téléchargées.",opts:["A. P1: Azure Document Intelligence / P2: Azure Language / P3: Azure Vision","B. P1: Azure Language / P2: Azure Document Intelligence / P3: Azure Vision","C. P1: Azure Vision / P2: Azure Language / P3: Azure Document Intelligence","D. P1: Azure Document Intelligence / P2: Azure Vision / P3: Azure Language"],ans:["A"],multi:false,exp:"P1→Azure Document Intelligence : extrait des données structurées des formulaires/factures. P2→Azure Language : résume du contenu écrit avec des modèles LLM/SLM. P3→Azure Vision : analyse les images et génère des légendes descriptives."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Un fabricant peut utiliser Azure Vision dans Foundry Tools pour identifier les défauts de produits sur une chaîne de montage.\n2. Une entreprise de logistique peut utiliser Azure Vision dans Foundry Tools pour reconnaître les étiquettes d'expédition de colis.\n3. Le département RH de votre entreprise ne peut utiliser Azure Vision dans Foundry Tools que pour extraire le contenu écrit des fichiers Microsoft Word.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : Azure Vision peut identifier les défauts sur une chaîne de montage. [2] Yes : il peut reconnaître les étiquettes d'expédition. [3] No : Azure Vision est principalement conçu pour les images, tandis que Document Intelligence gère les fichiers Word."},
{q:"Lorsque vous utilisez les connecteurs Microsoft 365 Copilot pour connecter du contenu externe à ______, vos utilisateurs peuvent trouver, résumer et apprendre à partir de données métier en utilisant des prompts en langage naturel.",opts:["A. Azure AI Search","B. Microsoft Graph","C. Microsoft Purview","D. Microsoft SharePoint"],ans:["B"],multi:false,exp:"En utilisant les connecteurs Microsoft Graph, vous pouvez indexer vos sources de données tierces — file shares, ServiceNow, bases SQL — directement dans Microsoft Graph, rendant ces données accessibles à Copilot."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Les connecteurs Microsoft 365 Copilot vous permettent d'indexer des données provenant de plusieurs sources pour les rendre disponibles dans Copilot.\n2. Vous pouvez créer un connecteur Microsoft 365 Copilot personnalisé lorsque les connecteurs disponibles ne répondent pas à vos exigences d'intégration de données.\n3. Pour utiliser les connecteurs Microsoft 365 Copilot, vous avez besoin d'une licence Microsoft Copilot Studio.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : les connecteurs permettent d'indexer des données provenant de plusieurs sources. [2] Yes : vous pouvez créer un connecteur personnalisé. [3] No : aucune licence Copilot Studio autonome n'est strictement requise."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Azure Vision dans Foundry Tools peut extraire et analyser des phrases clés à partir de fichiers PDF.\n2. Azure Vision dans Foundry Tools peut générer des images sur la base de descriptions en langage naturel.\n3. Azure Document Intelligence dans Foundry Tools peut être utilisé pour automatiser le traitement des factures et des notes de crédit.",opts:["A. Yes / No / Yes","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"[1] Yes : combiné avec Document Intelligence et Language, l'extraction de phrases clés est possible. [2] No : Azure Vision est conçu pour analyser des images existantes, pas pour les générer. [3] Yes : Document Intelligence automatise le traitement des factures."},
{q:"Votre entreprise stocke des milliers de rapports et documents à travers plusieurs systèmes. Vous recommandez Azure AI Search. Quel est un avantage clé de l'utilisation d'Azure AI Search dans ce scénario ?",opts:["A. génère des réponses aux questions des clients sans référencer les données existantes","B. interroge et récupère des informations dans de grandes collections de données en utilisant le langage naturel","C. automatise les flux de travail de documents en fonction du contenu du document","D. améliore la précision du modèle en ajustant les données organisationnelles"],ans:["B"],multi:false,exp:"Azure AI Search améliore considérablement la découverte d'informations grâce à la recherche en langage naturel et sémantique, l'ingestion multi-systèmes unifiée, l'enrichissement de contenu alimenté par l'IA, et la récupération hybride."},
{q:"Vous explorez comment Microsoft 365 Copilot utilise Microsoft Graph pour fournir des expériences alimentées par l'IA. Quelles informations dans Microsoft Graph Copilot peut-il utiliser par défaut ?",opts:["A. emails, fichiers, réunions et chats dans Microsoft 365","B. données stockées dans un partage de fichiers","C. activité sur les réseaux sociaux","D. contenu de sites Web publics"],ans:["A"],multi:false,exp:"Microsoft 365 Copilot est conçu comme un assistant IA exploitant Microsoft Graph pour accéder aux données de votre organisation, y compris les emails, fichiers, chats et réunions."},
{q:"Vous devez recommander un service qui prend en charge l'indexation d'informations et l'extraction d'insights à partir de documents. Que devez-vous recommander ?",opts:["A. Microsoft Foundry","B. Azure Vision dans Foundry Tools","C. Azure Document Intelligence dans Foundry Tools","D. Azure AI Search"],ans:["C"],multi:false,exp:"Document Intelligence dans Foundry Tools est conçu pour automatiser le traitement des données en extrayant des informations structurées, des paires clé-valeur, des tableaux et du texte à partir de documents non structurés."},
{q:"Faites correspondre le processus métier à l'approche de conception de solution d'IA appropriée :\nP1: Le département marketing veut une IA pour résumer les emails et créer des présentations.\nP2: Le département RH veut un agent conversationnel pour les questions de politique et les demandes de congé.\nP3: Le département fabrication veut une IA pour prédire les calendriers de maintenance.\nP4: Le département finance veut un accès alimenté par l'IA aux données ERP via des outils familiers.",opts:["A. P1: Build with Microsoft Copilot Studio / P2: Use Microsoft 365 Copilot / P3: Build with Azure Machine Learning / P4: Extend with Microsoft 365 Copilot connectors","B. P1: Use Microsoft 365 Copilot / P2: Build with Microsoft Copilot Studio / P3: Build with Azure Machine Learning / P4: Extend with Microsoft 365 Copilot connectors","C. P1: Extend with Microsoft 365 Copilot connectors / P2: Use Microsoft 365 Copilot / P3: Build with Microsoft Copilot Studio / P4: Build with Azure Machine Learning","D. P1: Build with Microsoft Copilot Studio / P2: Build with Azure Machine Learning / P3: Use Microsoft 365 Copilot / P4: Extend with Microsoft 365 Copilot connectors"],ans:["A"],multi:false,exp:"P1→Copilot Studio pour créer des agents personnalisés. P2→M365 Copilot pour un agent conversationnel. P3→Azure ML pour prédire la maintenance. P4→Connecteurs M365 Copilot pour l'accès aux données ERP."},
{q:"Microsoft 365 Copilot peut être utilisé pour ______.",opts:["A. surveiller le trafic réseau et les alertes en temps réel.","B. créer un document Microsoft Word.","C. créer une liste dans Microsoft SharePoint.","D. modifier les autorisations administratives pour les fichiers Microsoft SharePoint."],ans:["B"],multi:false,exp:"Microsoft 365 Copilot peut être utilisé pour créer, rédiger et raffiner des documents Microsoft Word — rédaction à partir de zéro, référencement de fichiers existants, conversion chat-vers-document, création de modèles."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft Foundry fournit une plateforme unifiée aux développeurs et professionnels des données pour créer des solutions d'IA personnalisées de bout en bout.\n2. Microsoft Foundry fournit une plateforme unifiée aux développeurs low-code et aux utilisateurs métier pour créer des solutions d'IA personnalisées de bout en bout.\n3. Vous avez besoin d'une licence Microsoft 365 Copilot pour accéder aux services Microsoft Foundry.",opts:["A. Yes / Yes / No","B. Yes / No / Yes","C. No / Yes / Yes","D. Yes / Yes / Yes"],ans:["A"],multi:false,exp:"[1] Yes : Foundry est pour les développeurs et professionnels des données. [2] Yes : il inclut aussi un Agent Builder no-code pour les utilisateurs métier. [3] No : Foundry nécessite un abonnement Azure, pas une licence M365 Copilot."},
{q:"Votre entreprise se prépare à adopter Microsoft 365 Copilot et veut suivre les principes d'IA responsable de Microsoft. Vous proposez d'établir un conseil de gouvernance de l'IA. Quel est l'objectif principal du conseil ?",opts:["A. surveiller le comportement des utilisateurs et faire respecter la conformité avec les politiques IT internes","B. former les employés à utiliser efficacement les fonctionnalités de Copilot","C. superviser la mise en œuvre, gérer les performances techniques et assurer un déploiement réussi de l'IA","D. guider la stratégie, fournir une supervision et assurer l'alignement interfonctionnel pour l'adoption responsable de l'IA"],ans:["D"],multi:false,exp:"Un conseil de gouvernance de l'IA est un organe multidisciplinaire qui supervise l'orientation stratégique, l'éthique, la gestion des risques, l'alignement interfonctionnel et l'application des politiques."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft 365 Copilot peut amplifier les défis existants de gouvernance des données.\n2. La mise en œuvre de Microsoft 365 Copilot réduit les coûts de gestion des données.\n3. Microsoft 365 Copilot peut aider les équipes IT à gérer les risques liés aux données.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] Copilot amplifie les défis si la gouvernance est faible. [2] Il peut réduire les coûts en rationalisant les workflows. [3] Il aide les équipes IT à gérer les risques via Purview et les permissions existantes."},
{q:"Une organisation qui exécute des charges de travail continues à grande échelle avec des modèles Azure OpenAI doit choisir le modèle de tarification ______.",opts:["A. Batch API","B. Provisioned (PTUs)","C. Standard (On-Demand)"],ans:["A"],multi:false,exp:"Pour des charges de travail continues, à grande échelle et non urgentes, Batch API offre 50% d'économies, un débit plus élevé, une efficacité asynchrone et un quota séparé."},
{q:"Votre entreprise vend du matériel de randonnée et de camping en ligne. Vous avez besoin d'une solution d'IA générative qui peut interagir avec les clients et poser des questions sur leurs besoins. Que devez-vous inclure dans la solution ?",opts:["A. un chatbot","B. l'IA prédictive","C. la vision par ordinateur","D. un moteur de recommandation"],ans:["A"],multi:false,exp:"Une solution d'IA générative prend la forme d'un AI Shopping Assistant ou d'un agent conversationnel qui utilise NLP et LLM pour engager dans un dialogue humain bidirectionnel."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Les contrôles de filtrage de contenu peuvent empêcher les réponses générées par l'IA d'exposer des informations confidentielles et sensibles.\n2. Le contenu généré par l'IA peut révéler involontairement des informations sensibles si le modèle a accès à des sources de données non sécurisées.\n3. Pour éviter l'exposition des données, seuls les prompts utilisés par les utilisateurs doivent être protégés à l'aide de politiques.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / Yes"],ans:["A"],multi:false,exp:"[1] Yes : les filtres de contenu agissent comme garde-fous. [2] Yes : les sources non sécurisées augmentent les risques d'exposition. [3] No : la protection des prompts seuls est insuffisante ; une stratégie complète est nécessaire."},
{q:"Vous avez un jeu de données historique qui contient 1 000 enregistrements. Vous avez besoin d'une solution d'IA qui peut analyser les données pour identifier des motifs et prédire des résultats futurs. Que devez-vous inclure dans la solution ?",opts:["A. Microsoft Foundry","B. Azure Document Intelligence dans Foundry Tools","C. Azure Machine Learning","D. Azure Content Understanding dans Foundry Tools"],ans:["C"],multi:false,exp:"Azure Machine Learning, en utilisant Automated Machine Learning (AutoML), est conçu pour analyser de grands jeux de données historiques, identifier des motifs et prédire des résultats futurs."},
{q:"Votre entreprise gère un catalogue en ligne de fournitures de bureau. Vous prévoyez d'utiliser une solution d'IA générative pour créer des descriptions de produits. Quel est le meilleur type de solution à utiliser ?",opts:["A. modèle Azure Machine Learning personnalisé","B. l'agent Researcher dans Microsoft 365 Copilot","C. un agent IA interactif","D. un grand modèle de langage ajusté (LLM)"],ans:["B"],multi:false,exp:"L'utilisation de l'agent Researcher dans Microsoft 365 Copilot permet aux employés non techniques de générer du contenu adapté à la marque en exploitant les données produit internes et la recherche web."},
{q:"Votre entreprise a une solution d'IA qui utilise un modèle Azure OpenAI prédéfini. Vous devez réduire les coûts tout en minimisant l'impact sur la qualité. Quelles deux actions devez-vous effectuer ?",opts:["A. Passer à un modèle alternatif.","B. Appliquer la modération de contenu.","C. Optimiser les prompts.","D. Réduire le nombre d'heures d'hébergement pour le modèle.","E. Ajuster (fine-tune) le modèle existant."],ans:["A","C"],multi:true,exp:"[A] Utiliser le routage et le tiering de modèles peut réduire les coûts de 30-60%. [C] L'optimisation des prompts (compression, décomposition de tâches, raccourcissement du contexte) réduit directement les coûts."},
{q:"Que devez-vous utiliser pour chaque tâche ?\nP1: Extraire des informations de factures et de notes de crédit.\nP2: Identifier les sujets de discussion dans les enregistrements d'appels du service client.\nP3: Détecter le sentiment et les opinions des clients.",opts:["A. P1: Azure Document Intelligence / P2: Azure Speech / P3: Azure Language","B. P1: Azure Language / P2: Azure Document Intelligence / P3: Azure Speech","C. P1: Azure Speech / P2: Azure Language / P3: Azure Document Intelligence","D. P1: Azure Document Intelligence / P2: Azure Language / P3: Azure Speech"],ans:["A"],multi:false,exp:"P1→Document Intelligence : extrait des informations structurées des factures. P2→Azure Speech : transcrit et identifie les sujets dans les appels. P3→Azure Language : détecte le sentiment et les opinions."},
{q:"Votre entreprise achète Microsoft 365 Copilot pour son département des ventes. Le département des ventes a besoin de trouver et résumer rapidement les informations dans les documents internes. À partir de quelles deux sources de données le département peut-il obtenir des résultats par défaut ?",opts:["A. Microsoft OneDrive","B. un partage de fichiers sur site","C. Microsoft SharePoint","D. Microsoft Sway","E. un système CRM personnalisé"],ans:["A","C"],multi:true,exp:"Avec Microsoft 365 Copilot, les deux principales sources de données utilisées pour le grounding avec les documents internes sont SharePoint et OneDrive."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft Copilot dans Outlook peut envoyer automatiquement des réponses de suivi aux emails.\n2. Microsoft Copilot dans Outlook peut identifier et faire ressortir les tâches mentionnées dans vos emails.\n3. Microsoft Copilot dans Outlook peut résumer les longs fils d'emails et mettre en évidence les actions et délais.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. Copilot dans Outlook automatise les réponses de suivi, identifie et fait ressortir les tâches, et résume les longs fils d'emails en mettant en évidence les actions et délais."},
{q:"Le département RH de votre entreprise passe beaucoup de temps à répondre à des questions répétitives. Vous avez besoin d'une solution qui peut automatiser les interactions avec les employés et se connecter aux sources de données métier internes. Que recommandez-vous ?",opts:["A. Microsoft Security Copilot","B. Microsoft Copilot Studio","C. Microsoft 365 Copilot","D. Microsoft Copilot dans Azure"],ans:["B"],multi:false,exp:"Microsoft Copilot Studio est la solution la plus adéquate pour automatiser les interactions avec les employés, répondre aux questions RH et se connecter aux sources de données métier internes."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft 365 Copilot aide les utilisateurs à créer et analyser du contenu dans les applications Microsoft 365.\n2. Microsoft Copilot Studio peut uniquement être utilisé pour personnaliser Microsoft 365 Copilot.\n3. Microsoft Security Copilot utilise l'IA pour attribuer des étiquettes de sensibilité aux documents.",opts:["A. Yes / No / Yes","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : M365 Copilot aide à créer/analyser du contenu. [2] No : Copilot Studio est une plateforme low-code autonome complète pour construire des agents indépendants. [3] Yes : Security Copilot/Purview utilise l'IA pour attribuer des étiquettes de sensibilité."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft 365 Copilot peut aider les utilisateurs à composer des emails professionnels et à résumer des conversations.\n2. Lorsqu'il y est invité, Microsoft 365 Copilot peut mettre à jour de manière autonome un tableur contenant des données de ventes.\n3. Microsoft 365 Copilot peut résumer les mises à jour récentes dans les documents, tableurs et présentations.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] Copilot aide à composer des emails et résumer des conversations. [2] Il peut mettre à jour des tableurs. [3] Il peut résumer les mises à jour récentes dans les documents, tableurs et présentations."},
{q:"______ peut analyser les documents internes pour détecter les informations personnellement identifiables (PII) et masquer les PII de la sortie.",opts:["A. Azure Language dans Foundry Tools","B. Azure AI Search","C. Azure Vision dans Foundry Tools","D. Azure Document Intelligence dans Foundry Tools"],ans:["A"],multi:false,exp:"Azure Language dans Foundry Tools fournit des capacités spécialisées pour détecter et masquer les informations personnellement identifiables (PII) à partir de documents internes et de texte non structuré."},
{q:"Votre entreprise gère un site web qui publie des articles d'actualité quotidiens. Vous devez recommander une solution d'IA qui peut analyser le texte et identifier les principales personnes, lieux et entreprises mentionnés. Que recommandez-vous ?",opts:["A. Azure Language dans Foundry Tools","B. Azure Vision dans Foundry Tools","C. Content Safety dans Foundry Control Plane","D. Azure Speech dans Foundry Tools"],ans:["A"],multi:false,exp:"Azure Language dans Foundry Tools peut analyser le texte et identifier les principales entités, y compris les personnes, lieux et entreprises. Cette capacité est officiellement appelée Reconnaissance d'Entités Nommées (NER)."},
{q:"Faites correspondre les processus métier aux solutions Microsoft Copilot appropriées :\nP1: Création de résumés financiers et de rapports visuels à partir de classeurs Microsoft Excel.\nP2: Construction d'un agent autonome en utilisant une approche low-code.",opts:["A. P1: Microsoft 365 Copilot / P2: Microsoft Copilot Studio","B. P1: Microsoft Copilot Studio / P2: Microsoft 365 Copilot","C. P1: Copilot dans Power Automate / P2: GitHub Copilot","D. P1: GitHub Copilot / P2: Copilot dans Power Automate"],ans:["A"],multi:false,exp:"P1→Microsoft 365 Copilot peut générer des résumés financiers et des rapports visuels dans Excel. P2→Microsoft Copilot Studio est la solution low-code principale pour construire des agents autonomes."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Microsoft 365 Copilot permet aux utilisateurs de rechercher dans les emails, fichiers, chats, réunions et applications connectées en utilisant des requêtes en langage naturel.\n2. Microsoft 365 Copilot fournit une protection des données et aide à garantir que les prompts utilisateur et les données de chat sont sécurisés.\n3. Microsoft 365 Copilot est inclus dans tous les abonnements Microsoft 365.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : Copilot permet la recherche en langage naturel à travers M365. [2] Yes : il fournit Enterprise Data Protection. [3] No : il n'est pas inclus dans tous les abonnements ; nécessite un add-on payant pour les entreprises."},
{q:"Votre entreprise évalue l'utilisation de Microsoft Copilot Studio. Quelles deux capacités sont directement prises en charge ?",opts:["A. rédaction et résumé de fichiers dans Microsoft Word et PowerPoint","B. personnalisation du comportement et des réponses de l'agent","C. utilisation d'agents pour identifier et répondre aux incidents de sécurité","D. construction d'agents qui se connectent aux données métier et automatisent les interactions utilisateur","E. configuration de la sécurité des documents"],ans:["C","D"],multi:true,exp:"[C] Microsoft Copilot Studio permet de construire des agents qui peuvent être conçus pour identifier et répondre aux incidents de sécurité via l'intégration avec Security Copilot. [D] Il permet de construire des agents qui se connectent aux données métier et automatisent les interactions."},
{q:"______ est une plateforme unifiée pour le développement d'IA d'entreprise, où vous pouvez construire, personnaliser, évaluer et gérer des applications et des modèles d'IA.",opts:["A. Microsoft Foundry","B. Microsoft Power Platform","C. Azure Machine Learning"],ans:["A"],multi:false,exp:"Microsoft Foundry est une plateforme-as-a-service (PaaS) unifiée conçue pour les opérations d'IA d'entreprise, permettant aux développeurs de construire, personnaliser, évaluer et gérer des applications d'IA et des agents."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Vous pouvez utiliser Azure Language dans Foundry Tools pour analyser le sentiment des avis clients.\n2. Vous pouvez utiliser Azure Language dans Foundry Tools pour traduire des rapports internes en plusieurs langues.\n3. Vous pouvez utiliser Azure Language dans Foundry Tools pour extraire du texte à partir de documents numérisés.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : Azure Language peut effectuer une analyse de sentiment sur les avis clients. [2] Yes : il peut traduire des rapports internes. [3] No : Document Intelligence est l'outil principal pour extraire du texte de documents numérisés."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Pour qu'un utilisateur accède aux données organisationnelles depuis un appareil mobile, il a besoin d'une licence Microsoft 365 Copilot.\n2. Pour raisonner sur vos données organisationnelles en utilisant Microsoft Graph, vous avez besoin d'une licence Microsoft 365 Copilot.\n3. Pour utiliser l'agent Analyst, vous avez besoin d'une licence Microsoft 365 Copilot.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] L'accès aux données organisationnelles depuis un appareil mobile nécessite une licence Copilot. [2] Le raisonnement sur Microsoft Graph nécessite une licence Copilot. [3] L'agent Analyst nécessite une licence Copilot."},
{q:"Votre entreprise prévoit d'adopter l'IA dans plusieurs unités métier. Vous devez vous assurer que tous les projets d'IA s'alignent sur la stratégie métier et sont mis en œuvre de manière responsable. Quelle est la meilleure approche ?",opts:["A. Permettre à chaque département de déployer ses propres outils d'IA.","B. Déléguer la prise de décision sur l'IA au département IT.","C. Externaliser le développement de l'IA à un fournisseur externe.","D. Établir un conseil d'IA pour fournir des conseils, une supervision et une coordination."],ans:["D"],multi:false,exp:"Un conseil d'IA est un organe consultatif interfonctionnel et de niveau conseil d'administration conçu pour aligner les initiatives d'IA sur la stratégie de l'entreprise."},
{q:"Votre entreprise utilise Microsoft 365 Copilot Chat. Certains utilisateurs ont besoin de construire et utiliser des agents déclaratifs pouvant accéder aux données de travail. Quel type de licence devez-vous recommander ?",opts:["A. une licence add-on Microsoft 365 Copilot","B. licence utilisateur Microsoft Copilot Studio","C. un plan Copilot Chat pay-as-you-go"],ans:["A"],multi:false,exp:"Pour utiliser des agents déclaratifs accédant aux données de travail (SharePoint ou connecteurs Graph), les utilisateurs ont besoin d'une licence add-on Microsoft 365 Copilot."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Permettre aux modèles d'IA de prendre des décisions autonomes soutient le principe d'IA responsable de Microsoft de responsabilité.\n2. Tester régulièrement les modèles d'IA pour l'équité et l'inclusion aide à garantir qu'ils s'alignent sur les principes d'IA responsable de Microsoft.\n3. La protection des données utilisateur et la limitation de l'accès aux informations personnelles soutiennent les principes d'IA responsable de confidentialité et de sécurité.",opts:["A. No / Yes / Yes","B. Yes / Yes / Yes","C. No / No / Yes","D. Yes / No / Yes"],ans:["A"],multi:false,exp:"[1] No : le principe de responsabilité exige que les humains restent l'autorité finale. [2] Yes : tester régulièrement l'équité aligne avec les principes. [3] Yes : protéger les données soutient les principes de confidentialité et de sécurité."},
{q:"Votre entreprise prévoit de mettre en œuvre une preuve de concept (PoC) d'agent qui utilise Azure OpenAI. La solution doit commencer petit et offrir une flexibilité pour évoluer. Quel modèle de tarification devez-vous utiliser ?",opts:["A. Microsoft 365 Copilot","B. Batch API","C. Provisioned (PTUs)","D. Standard (On-Demand)"],ans:["D"],multi:false,exp:"Le niveau Standard (On-Demand) est le meilleur choix pour ce scénario car il suit un modèle de consommation pay-as-you-go, permettant de commencer un PoC sans coût initial."},
{q:"Pour vous assurer que votre organisation suit les principes d'IA digne de confiance, l'organisation devrait établir un conseil de gouvernance de l'IA pour ______.",opts:["A. configurer et déployer des modèles d'IA dans l'environnement Azure de l'organisation.","B. guider la stratégie d'IA, assurer la supervision responsable de l'IA et promouvoir l'alignement entre les unités métier.","C. gérer les tâches quotidiennes d'entraînement et d'étiquetage des modèles pour les équipes de développement d'IA."],ans:["B"],multi:false,exp:"Un conseil de gouvernance de l'IA doit être un organe interfonctionnel et multidisciplinaire qui supervise le développement, le déploiement et l'évaluation des solutions d'IA pour s'assurer qu'elles sont éthiques, sécurisées et alignées sur les valeurs organisationnelles."},
{q:"Votre entreprise déploie une solution d'approbation de prêt alimentée par l'IA qui permet aux candidats de demander une explication. Quel principe d'IA responsable de Microsoft est-ce un exemple ?",opts:["A. équité (fairness)","B. confidentialité et sécurité","C. transparence","D. inclusion"],ans:["C"],multi:false,exp:"Selon les directives de Microsoft, la transparence signifie que les systèmes d'IA doivent être compréhensibles et que les utilisateurs doivent pouvoir comprendre les décisions ou recommandations du système."},
{q:"Votre entreprise veut s'assurer que les solutions d'IA sont utilisées de manière responsable et s'alignent sur les valeurs et les exigences de conformité. Vous devez établir des principes de gouvernance pour l'utilisation de l'IA. Quelles deux actions devez-vous effectuer ?",opts:["A. Permettre à chaque département d'adapter les processus de gouvernance pour ses propres initiatives d'IA.","B. Définir les normes de responsabilité pour les décisions d'IA entre les équipes métier et techniques.","C. Créer un processus pour examiner les initiatives d'IA pour l'alignement de l'IA responsable.","D. Attribuer la propriété de la gouvernance principalement aux équipes d'ingénierie d'IA et de science des données.","E. Concentrer les efforts de gouvernance sur les systèmes d'IA qui traitent des données réglementées ou sensibles."],ans:["B","C"],multi:true,exp:"[B] Définir des normes de responsabilité pour les décisions d'IA est essentiel. [C] Créer un processus structuré d'examen traduit les principes éthiques en pratique opérationnelle."},
{q:"Votre entreprise déploie Microsoft 365 Copilot. Le déploiement doit fournir aux utilisateurs l'accès à l'agent Researcher pour rechercher dans les données de Microsoft SharePoint. Quel plan de licence devez-vous recommander ?",opts:["A. une licence add-on par utilisateur Microsoft 365 Copilot","B. pay-as-you-go","C. un droit d'abonnement Microsoft 365","D. une licence de consommation basée sur l'utilisation dans Azure"],ans:["A"],multi:false,exp:"Pour utiliser l'agent Researcher pour rechercher dans les données Microsoft SharePoint, vous avez besoin de la licence add-on Microsoft 365 Copilot."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Un obstacle à l'adoption de l'IA peut inclure des limitations de données et un manque de préparation et de compétences en IA.\n2. Les organisations ont souvent du mal avec l'adoption de l'IA car elles donnent la priorité à la sélection de la technologie avant de définir des cas d'utilisation métier clairs.\n3. Le manque de collaboration interfonctionnelle est un obstacle courant à l'adoption de l'IA.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. Les limitations de données et le manque de compétences, la priorité à la technologie plutôt qu'aux cas d'usage, et le manque de collaboration interfonctionnelle sont tous des obstacles courants à l'adoption de l'IA."},
{q:"Qu'est-ce qui est considéré comme une bonne pratique lors de la formation d'une équipe d'adoption de l'IA dans un environnement d'entreprise ?",opts:["A. Inclure principalement le personnel IT et de gestion de projet pour rationaliser le déploiement.","B. Inclure des spécialistes des achats et de la gestion des fournisseurs tôt pour évaluer les outils d'IA.","C. Inclure des représentants du juridique, de la direction et des unités métier pour aligner les initiatives d'IA.","D. Inclure uniquement des data scientists et des ingénieurs pour valider la faisabilité technique."],ans:["C"],multi:false,exp:"Une équipe interfonctionnelle d'adoption de l'IA (Centre d'Excellence IA) garantit que les capacités techniques ne se développent pas isolément des exigences réglementaires ou des objectifs métier."},
{q:"Votre entreprise développe un agent de support client alimenté par l'IA. Vous devez vous assurer que la solution suit les principes d'IA responsable de Microsoft. Quelles deux actions devez-vous effectuer ?",opts:["A. Conserver toutes les conversations clients.","B. Tester l'agent pour s'assurer que les réponses sont inclusives et culturellement sensibles.","C. Permettre à l'agent de fonctionner de manière indépendante.","D. Vous assurer que l'agent peut être utilisé à plusieurs fins.","E. Fournir un avertissement clair que les utilisateurs interagissent avec une solution d'IA."],ans:["B","E"],multi:true,exp:"[B] Tester pour les réponses inclusives et culturellement sensibles aborde les principes d'équité et d'inclusion. [E] Fournir un avertissement clair est une exigence centrale du principe de transparence."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. Les jeux de données plus volumineux peuvent augmenter le coût d'une solution d'IA générative utilisant un espace de travail Azure Machine Learning.\n2. Le coût de la consommation des modèles Azure OpenAI est principalement identifié par le nombre de tokens d'entrée et de sortie traités.\n3. Le coût des solutions d'IA générative personnalisées reste toujours le même indépendamment de la version du modèle ou de la capacité utilisée.",opts:["A. Yes / Yes / No","B. Yes / Yes / Yes","C. No / Yes / Yes","D. Yes / No / No"],ans:["A"],multi:false,exp:"[1] Yes : les jeux de données plus volumineux augmentent les coûts (stockage, calcul, transfert). [2] Yes : Azure OpenAI est facturé par tokens. [3] No : le coût varie significativement selon la version du modèle et les capacités."},
{q:"Pour chaque énoncé, sélectionnez Yes ou No :\n1. L'utilisation de données incomplètes ou de mauvaise qualité pendant l'entraînement du modèle d'IA générative peut augmenter les coûts.\n2. Les modèles d'IA s'appuient sur les données d'entraînement pour apprendre des motifs et identifier des relations afin de produire des sorties.\n3. Les modèles d'IA générative entraînés sur des jeux de données non représentatifs peuvent produire des résultats inexacts ou déséquilibrés.",opts:["A. Yes / Yes / Yes","B. No / Yes / Yes","C. Yes / No / Yes","D. Yes / Yes / No"],ans:["A"],multi:false,exp:"Tous Yes. [1] Les données de mauvaise qualité augmentent les coûts via le nettoyage et les corrections. [2] Les modèles s'appuient sur les données pour apprendre. [3] Les jeux de données non représentatifs produisent des biais."},
{q:"Votre entreprise utilise une solution d'IA générative ajustée. Vous découvrez que certaines réponses générées incluent un langage inapproprié basé sur des suppositions validistes. Vous devez empêcher les réponses inappropriées en minimisant les coûts. Que devez-vous faire ?",opts:["A. Appliquer une version plus récente du modèle d'IA générative.","B. Appliquer un filtre de modération de contenu.","C. Créer une nouvelle version entraînée uniquement sur du contenu inclusif et représentatif.","D. Créer une nouvelle version entraînée uniquement sur du contenu exclusif."],ans:["B"],multi:false,exp:"L'implémentation d'un filtre de modération de contenu est une stratégie critique pour empêcher la sortie de langage inapproprié ou exclusif, agissant comme une 'couche de sécurité numérique'."},
{q:"Votre entreprise prévoit d'utiliser une solution alimentée par l'IA pour analyser les commentaires des clients. Vous devez atténuer les risques liés à la confidentialité. Quelle est la meilleure approche ?",opts:["A. Supprimer toutes les données de commentaires immédiatement après l'analyse.","B. S'assurer que les commentaires sont attribuables au client pour qu'ils puissent être supprimés sur demande.","C. Limiter les examens de confidentialité à la phase finale du cycle de vie du projet d'IA.","D. Anonymiser les données source pour supprimer les informations personnellement identifiables (PII) des clients."],ans:["D"],multi:false,exp:"Une approche 'privacy by design' utilisant le masquage PII alimenté par l'IA pour supprimer les données sensibles avant qu'elles n'atteignent le modèle d'analyse atténue les risques de confidentialité."},
{q:"Un moyen efficace d'échelonner la maîtrise et l'adoption de l'IA parmi les employés est de ______.",opts:["A. lancer une campagne interne pour promouvoir la sensibilisation à l'IA.","B. offrir un cours de formation en ligne autodidacte pour les employés.","C. définir des indicateurs de performance pour l'utilisation des outils d'IA.","D. établir un programme de champions pour votre entreprise."],ans:["D"],multi:false,exp:"Établir un programme de champions de l'IA est une stratégie hautement efficace et centrée sur l'humain pour échelonner la maîtrise et l'adoption de l'IA, en exploitant des pairs de confiance pour défendre et soutenir leurs collègues."},

function parseYesNoQuestion(q){
  if(q.multi)return null;
  const lines=q.q.split('\n').map(s=>s.trim()).filter(Boolean);
  const stmts=[];
  for(const line of lines){
    const m=line.match(/^(\d+)\.\s+(.*)$/);
    if(m)stmts.push(m[2].trim());
  }
  if(stmts.length<2)return null;
  const ansLetter=q.ans[0];
  const idx=ansLetter.charCodeAt(0)-65;
  const correctOpt=q.opts[idx];
  if(!correctOpt)return null;
  const cleaned=correctOpt.replace(/^[A-F]\.\s*/,'').trim();
  const parts=cleaned.split('/').map(s=>s.trim());
  if(parts.length!==stmts.length)return null;
  const norm=parts.map(p=>{const u=p.toLowerCase();if(u==='yes')return 'Yes';if(u==='no')return 'No';return null;});
  if(norm.some(x=>x===null))return null;
  let intro=q.q.split('\n')[0].trim();
  return{intro,statements:stmts,correct:norm};
}
function isYesNo(qi){return !!parseYesNoQuestion(questions[qi]);}
function parseMatchQuestion(q){
  if(q.multi)return null;
  const lines=q.q.split('\n').map(s=>s.trim()).filter(Boolean);
  const prompts=[];
  for(const line of lines){
    const m=line.match(/^(P\d+):\s+(.*)$/);
    if(m)prompts.push({label:m[1],text:m[2].trim()});
  }
  if(prompts.length<2)return null;
  const ansLetter=q.ans[0];
  const idx=ansLetter.charCodeAt(0)-65;
  const correctOpt=q.opts[idx];
  if(!correctOpt)return null;
  const cleaned=correctOpt.replace(/^[A-F]\.\s*/,'').trim();
  const parts=cleaned.split('/').map(s=>s.trim());
  if(parts.length!==prompts.length)return null;
  const correct=[];
  for(let i=0;i<parts.length;i++){
    const m=parts[i].match(/^P\d+:\s*(.+)$/);
    if(!m)return null;
    correct.push(m[1].trim());
  }
  const choiceSet=new Set();
  for(const opt of q.opts){
    const c=opt.replace(/^[A-F]\.\s*/,'').trim();
    const ps=c.split('/').map(s=>s.trim());
    for(const p of ps){
      const m=p.match(/^P\d+:\s*(.+)$/);
      if(m)choiceSet.add(m[1].trim());
    }
  }
  const choices=[...choiceSet];
  if(!choices.length)return null;
  const intro=q.q.split('\n')[0].trim();
  return{intro,prompts,choices,correct};
}
function pointsForQuestion(qi){
  const q=questions[qi];
  const yn=parseYesNoQuestion(q);
  if(yn)return yn.statements.length;
  const mq=parseMatchQuestion(q);
  if(mq)return mq.prompts.length;
  return 1;
}
function totalPossiblePoints(){let t=0;for(let i=0;i<questions.length;i++)t+=pointsForQuestion(i);return t;}
